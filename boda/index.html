<!doctype html>
<html lang="ca">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eduard & Teresa</title>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="rectangle">

        <!-- LEFT PANEL -->
        <div class="left-panel">

            <!-- Language buttons -->
            <div class="lang-buttons">
                <button class="lang-btn active" id="btn-CAT" onclick="setLanguage('CAT')">CAT</button>
                <button class="lang-btn" id="btn-ESP" onclick="setLanguage('ESP')">ESP</button>
                <button class="lang-btn" id="btn-ENG" onclick="setLanguage('ENG')">ENG</button>
            </div>

            <!-- Centered content -->
            <div class="main-content">
                <div class="title">EDUARD<br><span class="ampersand">&amp;</span><br>TERESA</div>
                <p class="explanation" id="explanation">En temps de Covid tota distracció és benvinguda...</p>
                <input type="text" class="puzzle-input" id="puzzle-input" placeholder="Mira't bé el puzzle">
                <button class="submit-btn" onclick="handleSubmit()">Envia</button>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <img src="assets/anime.png" alt="">
        </div>
    </div>

    <script src="boda.js"></script>
</body>

</html>
