<!doctype html>
<html lang="ca">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eduard & Teresa</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: white;
        }

        body {
            padding: 2.5vh 5vw;
            display: flex;
            align-items: stretch;
        }

        .rectangle {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 0.5fr 1fr;
            overflow: hidden;
        }

        /* ── LEFT PANEL ── */
        .left-panel {
            background: #faf7f2;
            color: #2c2c2c;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 1.5rem 2rem;
        }

        /* Language buttons — top-right, 15px from top, flush with right border */
        .lang-buttons {
            position: absolute;
            top: 15px;
            right: 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            width: 108px;
        }

        .lang-btn {
            height: 25px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 0.7rem;
            font-family: inherit;
            color: inherit;
            letter-spacing: 0.05em;
            transition: border-color 0.15s;
        }

        .lang-btn:hover,
        .lang-btn.active {
            border-bottom-color: #2c2c2c;
        }

        /* Main content — vertically centered */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            width: 100%;
        }

        .title {
            text-align: center;
            font-size: clamp(1.4rem, 2.5vw, 2rem);
            font-family: Georgia, serif;
            line-height: 1.4;
            letter-spacing: 0.05em;
        }

        .explanation {
            text-align: center;
            font-size: clamp(0.75rem, 1.2vw, 0.9rem);
            line-height: 1.5;
            max-width: 85%;
            font-style: italic;
        }

        .puzzle-input {
            width: 85%;
            padding: 0.45rem 0.75rem;
            border: 1px solid #bbb;
            background: white;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .puzzle-input:focus {
            border-color: #888;
        }

        /* Submit button — pinned to bottom */
        .submit-btn {
            background: black;
            color: white;
            border: none;
            padding: 0.5rem 2.5rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .submit-btn:hover {
            background: #333;
        }

        /* ── RIGHT PANEL ── */
        .right-panel {
            overflow: hidden;
        }

        .right-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 50% 42%;
            display: block;
        }

        /* ── SMALL SCREENS: stack, no vertical scroll ── */
        @media (max-width: 768px) {
            .rectangle {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .left-panel {
                padding-top: 50px;
                padding-bottom: 1rem;
            }

            .main-content {
                gap: 0.75rem;
            }

            .submit-btn {
                margin-bottom: 0;
            }
        }
    </style>
</head>

<body>
    <div class="rectangle">

        <!-- LEFT PANEL -->
        <div class="left-panel">

            <!-- Language buttons -->
            <div class="lang-buttons">
                <button class="lang-btn active" id="btn-CAT" onclick="setLanguage('CAT')">CAT</button>
                <button class="lang-btn"        id="btn-ESP" onclick="setLanguage('ESP')">ESP</button>
                <button class="lang-btn"        id="btn-ENG" onclick="setLanguage('ENG')">ENG</button>
            </div>

            <!-- Centered content -->
            <div class="main-content">
                <div class="title">EDUARD<br>&amp;<br>TERESA</div>
                <p class="explanation" id="explanation">En temps de Covid tota distracció és benvinguda</p>
                <input type="text" class="puzzle-input" id="puzzle-input" placeholder="Mira't bé el puzzle">
            </div>

            <!-- Submit button at bottom -->
            <button class="submit-btn" onclick="handleSubmit()">Envia</button>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <img src="anime.png" alt="">
        </div>
    </div>

    <script src="boda.js"></script>
</body>

</html>
